name: build-test-deploy

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: action/checkout@v7
      - name: use node.js
        uses: action/setup-node@v4
        with:
          - node-version: '20.x'
      - run: npn install
      - run: npm run build
